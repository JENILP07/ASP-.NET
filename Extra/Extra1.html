<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <title>Form 1</title>
  </head>
  <body style="background-color: blue">
    <div class="container" style="background-color: white; margin-top: 100px; width: 5000px; height: 550px;">
      <h2>Registration</h2>
      <br />

      <div>Personal details</div>

      <div class="container">
        <div class="row">
          <div class="col">
            Fullname
            <div class="input-group mb-3">
              <input
                type="text"
                class="form-control"
                placeholder="Username"
                aria-label="Name"
                aria-describedby="basic-addon1"
              />
            </div>
          </div>

          <div class="col">
            Date Of Birth
            <div class="input-group mb-3">
              <input
                type="date"
                class="form-control"
                placeholder="Username"
                aria-label="Username"
                aria-describedby="basic-addon1"
              />
            </div>
          </div>

          <div class="col">
            Email
            <div class="input-group mb-3">
              <input
                type="email"
                class="form-control"
                placeholder="Username"
                aria-label="Username"
                aria-describedby="basic-addon1"
              />
            </div>
          </div>
        </div>

        <div class="row">
          <div class="col">
            Mobile Number
            <div class="input-group mb-3">
              <input
                type="number"
                class="form-control"
                placeholder="Username"
                aria-label="Number"
                aria-describedby="basic-addon1"
              />
            </div>
          </div>

          <div class="col">
            Gender
            <div class="input-group mb-3">
              <input
                type="text"
                class="form-control"
                placeholder="Username"
                aria-label="Gender"
                aria-describedby="basic-addon1"
              />
            </div>
          </div>

          <div class="col">
            Occupation
            <div class="input-group mb-3">
              <input
                type="text"
                class="form-control"
                placeholder="Username"
                aria-label="Occupation"
                aria-describedby="basic-addon1"
              />
            </div>
          </div>
        </div>
      </div>

      <div>Identity Details</div>
      <div class="container">
        <div class="row">
          <div class="col">
            Id Type
            <div class="input-group mb-3">
              <input
                type="text"
                class="form-control"
                placeholder="Enter id type"
                aria-label="Name"
                aria-describedby="basic-addon1"
              />
            </div>
          </div>

          <div class="col">
            Id Number
            <div class="input-group mb-3">
              <input
                type="text"
                class="form-control"
                placeholder="Enter id number"
                aria-label="Username"
                aria-describedby="basic-addon1"
              />
            </div>
          </div>

          <div class="col">
            Issue Authority
            <div class="input-group mb-3">
              <input
                type="text"
                class="form-control"
                placeholder="Enter Authority department"
                aria-label="Username"
                aria-describedby="basic-addon1"
              />
            </div>
          </div>
        </div>

        <div class="row">
          <div class="col">
            Issue Date
            <div class="input-group mb-3">
              <input
                type="date"
                class="form-control"
                placeholder="Enter isuue date"
                aria-label="Number"
                aria-describedby="basic-addon1"
              />
            </div>
          </div>

          <div class="col">
            Issue State
            <div class="input-group mb-3">
              <input
                type="text"
                class="form-control"
                placeholder="Enter Issue state"
                aria-label="Gender"
                aria-describedby="basic-addon1"
              />
            </div>
          </div>

          <div class="col">
            Expiry Date
            <div class="input-group mb-3">
              <input
                type="date"
                class="form-control"
                placeholder=""
                aria-label="Occupation"
                aria-describedby="basic-addon1"
              />
            </div>
          </div>
        </div>
        <button type="button" class="btn btn-primary">Next</button>
      </div>
    </div>
  </body>
</html>
