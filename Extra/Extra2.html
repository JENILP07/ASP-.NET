<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <title>Form 2</title>
  </head>
  <body style="background-color: plum">
    <div class="container" style="background-color: cyan;">
      <h2 style="margin-left: 450px;">Student Registration Form</h2>
      <br />

      

      <div class="container">
        <div class="row">
          <div class="col">
            First name
            <div class="input-group mb-3">
              <input
                type="text"
                class="form-control"
                placeholder="First name"
                aria-label="Name"
                aria-describedby="basic-addon1"
              />
            </div>
          </div>
        </div>

        <div class="row">
          <div class="col">
            Middle name
            <div class="input-group mb-3">
              <input
                type="text"
                class="form-control"
                placeholder="Middle name"
                aria-label="Name"
                aria-describedby="basic-addon1"
              />
            </div>
          </div>
        </div>

        <div class="row">
          <div class="col">
            Last name
            <div class="input-group mb-3">
              <input
                type="text"
                class="form-control"
                placeholder="Last name"
                aria-label="Name"
                aria-describedby="basic-addon1"
              />
            </div>
          </div>
        </div>

        <div class="row">
          <div class="col">
            Course
            <div class="col">
              <select class="form-select" aria-label="Default select example">
                <option selected>Course</option>
                <option value="1">One</option>
                <option value="2">Two</option>
                <option value="3">Three</option>
              </select>
            </div>
          </div>
        </div>

        <div class="row">
          <div class="col">
            Gender:
            <div class="input-group mb-3">
             <div class="row">
              <div class="col">
                <div class="form-check">
                  <input class="form-check-input" type="radio" name="flexRadioDefault" id="flexRadioDefault1">
                  <label class="form-check-label" for="flexRadioDefault1">
                    Female
                  </label>
                </div>
              </div>
             </div>
             <div class="row">
              <div class="col">
                <div class="form-check">
                  <input class="form-check-input" type="radio" name="flexRadioDefault" id="flexRadioDefault1">
                  <label class="form-check-label" for="flexRadioDefault1">
                    Male
                  </label>
                </div>
              </div>
             </div>
              </div>
              <div class="row">
                <div class="col">
                  <div class="form-check">
                    <input class="form-check-input" type="radio" name="flexRadioDefault" id="flexRadioDefault1">
                    <label class="form-check-label" for="flexRadioDefault1">
                      Others
                    </label>
                  </div>
                </div>
               </div>
            </div>
          </div>
        </div>


        <div class="row">
          <div class="col">
            Phone
            <div class="input-group mb-3">
              <input
                type="number"
                class="form-control"
                placeholder="Number"
                aria-label="Name"
                aria-describedby="basic-addon1"
              />
            </div>
          </div>
        </div>


        <div class="row">
          <div class="col">
            Current Address
            <div class="input-group">
              <textarea class="form-control" aria-label="With textarea" placeholder="Address"></textarea>
            </div>
          </div>
        </div>

        <div class="row">
          <div class="col">
            Email
            <div class="input-group mb-3">
              <input
                type="email"
                class="form-control"
                placeholder="Email"
                aria-label="Username"
                aria-describedby="basic-addon1"
              />
            </div>
          </div>
        </div>
        <div class="row">
          <div class="col">
             Password
            <div class="input-group mb-3">
              <input
                type="password"
                class="form-control"
                placeholder="password"
                aria-label="Username"
                aria-describedby="basic-addon1"
              />
            </div>
          </div>
        </div>
        <div class="row">
          <div class="col">
            Re-Type Password
            <div class="input-group mb-3">
              <input
                type="password"
                class="form-control"
                placeholder="Re-Type password"
                aria-label="Username"
                aria-describedby="basic-addon1"
              />
            </div>
          </div>
        </div>
        <div class="row">
          <button type="button" class="btn btn-success">Register</button></div>
      </div>
    </div>
  </body>
</html>
